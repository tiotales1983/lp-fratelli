<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fratelli Studio Automotivo | Estética de Elite</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Scripts Necessários (Ordem Importa) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'racing-red': '#990000',
                        'metallic-silver': '#D1D1D1',
                        'pure-white': '#FFFFFF',
                        'deep-black': '#0A0A0A', // Levemente mais claro que o preto absoluto
                        'dark-gray': '#151515',
                        'whatsapp-green': '#25D366',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                    },
                    animation: {
                        'slow-zoom': 'slow-zoom 20s infinite alternate',
                    },
                    keyframes: {
                        'slow-zoom': {
                            '0%': { transform: 'scale(1)' },
                            '100%': { transform: 'scale(1.1)' },
                        }
                    }
                }
            }
        }
    </script>

    <style type="text/css">
        /* Prevenção de tela preta infinita */
        body {
            background-color: #0f0f0f;
            margin: 0;
            color: #D1D1D1;
            font-family: 'Inter', sans-serif;
        }

        .shiny-text {
            background: linear-gradient(to bottom, #FFFFFF 0%, #BDBDBD 50%, #FFFFFF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #990000;
            border-radius: 10px;
        }

        html {
            scroll-behavior: smooth;
        }

        /* Estilo para evitar o "pulo" de carregamento do React */
        #root:empty {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }
        #root:empty::after {
            content: "FRATELLI";
            color: #990000;
            font-family: 'Space Grotesk';
            font-weight: bold;
            letter-spacing: 5px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
    </style>
</head>
<body class="custom-scrollbar">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = window.Motion;

        const WHATSAPP_LINK = "https://wa.me/5511999999999";

        // Ícone Helper para evitar erros de renderização do Lucide
        const Icon = ({ name, className }) => {
            const LucideIcon = window.lucide[name];
            return LucideIcon ? <LucideIcon className={className} /> : null;
        };

        const SERVICES = [
            { id: 1, title: "Polimento Técnico", description: "Remoção de riscos e oxidação, devolvendo o brilho espelhado.", icon: "Sparkles" },
            { id: 2, title: "Funilaria Premium", description: "Reparação estética e estrutural com precisão artesanal.", icon: "Hammer" },
            { id: 3, title: "Pintura Especializada", description: "Cabine de pintura italiana com laboratório de cores.", icon: "Paintbrush" },
            { id: 4, title: "Martelinho de Ouro", description: "Remoção de amassados mantendo a originalidade da peça.", icon: "Zap" },
            { id: 5, title: "Detalhamento Interno", description: "Higienização profunda e revitalização de plásticos e couros.", icon: "Wind" },
            { id: 6, title: "Vitrificação 9H", description: "Proteção cerâmica de alta durabilidade contra raios UV e sujeira.", icon: "ShieldCheck" }
        ];

        function App() {
            const [scrolled, setScrolled] = useState(false);
            const [isMenuOpen, setIsMenuOpen] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                // Inicializa ícones lucide se necessário
                window.lucide.createIcons();
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <div className="min-h-screen bg-deep-black">
                    {/* Navbar */}
                    <nav className={`fixed w-full z-50 transition-all duration-500 ${scrolled ? 'bg-deep-black/95 backdrop-blur-lg py-4 border-b border-white/10' : 'bg-transparent py-8'}`}>
                        <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-racing-red rounded-lg flex items-center justify-center">
                                    <Icon name="Car" className="text-white w-6 h-6" />
                                </div>
                                <span className="text-2xl font-display font-bold tracking-tighter text-white">
                                    FRATELLI<span className="text-racing-red">STUDIO</span>
                                </span>
                            </div>

                            <div className="hidden md:flex items-center gap-10">
                                {['Início', 'Serviços', 'Galeria', 'Contato'].map((item) => (
                                    <a key={item} href={`#${item.toLowerCase()}`} className="text-xs font-bold uppercase tracking-widest hover:text-racing-red transition-colors">
                                        {item}
                                    </a>
                                ))}
                                <a href={WHATSAPP_LINK} className="bg-racing-red hover:bg-red-700 text-white px-6 py-2 rounded-full text-xs font-bold uppercase tracking-widest transition-all">
                                    Orçamento
                                </a>
                            </div>

                            <button className="md:hidden text-white" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                                <Icon name={isMenuOpen ? "X" : "Menu"} className="w-6 h-6" />
                            </button>
                        </div>
                    </nav>

                    {/* Mobile Menu */}
                    <AnimatePresence>
                        {isMenuOpen && (
                            <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="fixed inset-0 z-40 bg-deep-black flex flex-col items-center justify-center gap-8 md:hidden">
                                {['Início', 'Serviços', 'Galeria', 'Contato'].map((item) => (
                                    <a key={item} href={`#${item.toLowerCase()}`} onClick={() => setIsMenuOpen(false)} className="text-3xl font-display font-bold">
                                        {item}
                                    </a>
                                ))}
                            </motion.div>
                        )}
                    </AnimatePresence>

                    {/* Hero Section */}
                    <section id="inicio" className="relative h-screen flex items-center justify-center overflow-hidden">
                        <div className="absolute inset-0 z-0">
                            <img 
                                src="https://images.unsplash.com/photo-1619642751034-765dfdf7c58e?auto=format&fit=crop&q=80&w=1920" 
                                className="w-full h-full object-cover opacity-50 animate-slow-zoom"
                                alt="Carro luxuoso"
                            />
                            <div className="absolute inset-0 bg-gradient-to-b from-deep-black/20 via-deep-black/60 to-deep-black" />
                        </div>
                        
                        <div className="relative z-10 text-center px-6">
                            <motion.div initial={{ opacity: 0, y: 30 }} animate={{ opacity: 1, y: 0 }} transition={{ duration: 1 }}>
                                <span className="inline-block border border-racing-red/50 bg-racing-red/10 text-racing-red px-6 py-2 rounded-full text-xs font-bold uppercase tracking-[0.3em] mb-8">
                                    Estética Automotiva de Elite
                                </span>
                                <h1 className="text-5xl md:text-8xl font-display font-bold mb-8 leading-none shiny-text">
                                    A ARTE DO <br /> <span className="text-racing-red italic font-black">DETALHAMENTO.</span>
                                </h1>
                                <p className="text-metallic-silver max-w-xl mx-auto text-lg mb-10 font-light">
                                    Transformamos veículos em obras de arte. Tecnologia de ponta e cuidado artesanal para quem exige perfeição.
                                </p>
                                <div className="flex flex-col sm:flex-row items-center justify-center gap-6">
                                    <a href="#servicos" className="bg-white text-black px-10 py-4 rounded-full font-bold uppercase tracking-widest hover:bg-racing-red hover:text-white transition-all w-full sm:w-auto">
                                        Conhecer Serviços
                                    </a>
                                    <a href={WHATSAPP_LINK} className="flex items-center gap-3 text-white font-bold uppercase tracking-widest hover:text-racing-red transition-all">
                                        <div className="w-12 h-12 rounded-full border border-white/20 flex items-center justify-center">
                                            <Icon name="Play" className="w-4 h-4 fill-current" />
                                        </div>
                                        Agendar Visita
                                    </a>
                                </div>
                            </motion.div>
                        </div>
                    </section>

                    {/* Services Section */}
                    <section id="servicos" className="py-32 bg-deep-black">
                        <div className="max-w-7xl mx-auto px-6">
                            <div className="flex flex-col md:flex-row justify-between items-end mb-20 gap-8">
                                <div>
                                    <h2 className="text-4xl md:text-6xl font-display font-bold shiny-text">SERVIÇOS</h2>
                                    <p className="text-racing-red font-bold tracking-[0.2em] mt-2 italic uppercase">Especialidades Fratelli</p>
                                </div>
                                <p className="max-w-md text-metallic-silver/60 text-sm">Oferecemos uma gama completa de serviços para manter seu veículo com aspecto de zero quilômetro.</p>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                {SERVICES.map((s, i) => (
                                    <motion.div 
                                        whileHover={{ y: -10 }}
                                        key={i} 
                                        className="bg-dark-gray p-10 rounded-3xl border border-white/5 hover:border-racing-red/40 transition-all group"
                                    >
                                        <div className="w-14 h-14 bg-deep-black rounded-2xl flex items-center justify-center mb-8 group-hover:bg-racing-red transition-colors duration-500">
                                            <Icon name={s.icon} className="text-racing-red w-7 h-7 group-hover:text-white" />
                                        </div>
                                        <h3 className="text-2xl font-bold mb-4 text-white group-hover:text-racing-red transition-colors">{s.title}</h3>
                                        <p className="text-metallic-silver/70 leading-relaxed text-sm">{s.description}</p>
                                    </motion.div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* CTA Section */}
                    <section id="contato" className="py-20">
                        <div className="max-w-7xl mx-auto px-6">
                            <div className="bg-gradient-to-r from-racing-red to-red-900 rounded-[3rem] p-12 md:p-20 text-center relative overflow-hidden">
                                <div className="absolute top-0 right-0 w-64 h-64 bg-white/10 rounded-full -translate-y-1/2 translate-x-1/2 blur-3xl" />
                                <h2 className="text-4xl md:text-6xl font-display font-bold text-white mb-8">SEU CARRO MERECE <br/> O MELHOR TRATAMENTO</h2>
                                <p className="text-white/80 mb-12 max-w-2xl mx-auto">Solicite um orçamento personalizado agora mesmo via WhatsApp e descubra por que somos referência em estética automotiva.</p>
                                <a href={WHATSAPP_LINK} className="inline-flex items-center gap-4 bg-white text-racing-red px-12 py-5 rounded-full font-black uppercase tracking-widest hover:scale-105 transition-transform shadow-2xl">
                                    <Icon name="MessageCircle" className="w-6 h-6" />
                                    Falar no WhatsApp
                                </a>
                            </div>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="py-12 border-t border-white/5">
                        <div className="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-8">
                            <div className="flex items-center gap-3">
                                <Icon name="Car" className="text-racing-red w-6 h-6" />
                                <span className="text-xl font-display font-bold text-white uppercase tracking-tighter">FRATELLI</span>
                            </div>
                            <p className="text-metallic-silver/40 text-xs uppercase tracking-[0.2em]">© 2024 Fratelli Studio Automotivo. Todos os direitos reservados.</p>
                            <div className="flex gap-6">
                                <Icon name="Instagram" className="w-5 h-5 hover:text-racing-red cursor-pointer transition-colors" />
                                <Icon name="Facebook" className="w-5 h-5 hover:text-racing-red cursor-pointer transition-colors" />
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
