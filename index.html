<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fratelli Studio Automotivo | Estética de Elite</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'racing-red': '#E60000',
                        'metallic-silver': '#BDBDBD',
                        'pure-white': '#FFFFFF',
                        'deep-black': '#000000',
                        'dark-gray': '#0A0A0A',
                        'whatsapp-green': '#25D366',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                    },
                    animation: {
                        'slow-zoom': 'slow-zoom 20s infinite alternate',
                    },
                    keyframes: {
                        'slow-zoom': {
                            '0%': { transform: 'scale(1)' },
                            '100%': { transform: 'scale(1.1)' },
                        }
                    }
                }
            }
        }
    </script>

    <style type="text/css">
        body {
            background-color: #000000;
            color: #BDBDBD;
            font-family: 'Inter', sans-serif;
            margin: 0;
        }
        .shiny-text {
            background: linear-gradient(to bottom, #FFFFFF 0%, #BDBDBD 50%, #FFFFFF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        html { scroll-behavior: smooth; }
        
        /* Ajuste para ícones Lucide no React */
        [data-lucide] {
            display: inline-block;
            stroke-width: 2;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const WHATSAPP_LINK = "https://wa.me/5511999999999?text=Olá! Gostaria de agendar um serviço no Fratelli Studio.";

        const SERVICES = [
            { id: 1, title: "Polimento Técnico", description: "Remoção de riscos e oxidação, devolvendo o brilho original.", icon: "sparkles" },
            { id: 2, title: "Funilaria (Bodywork)", description: "Reparação de danos com precisão milimétrica.", icon: "hammer" },
            { id: 3, title: "Pintura Automotiva", description: "Cabine de pintura com secagem controlada.", icon: "paintbrush" },
            { id: 4, title: "Martelinho de Ouro", description: "Remoção de amassados sem repintura.", icon: "zap" },
            { id: 5, title: "Detalhamento", description: "Limpeza minuciosa de cada detalhe do veículo.", icon: "search" },
            { id: 8, title: "Vitrificação Cerâmica", description: "Proteção 9H contra raios UV e agentes químicos.", icon: "shield-check" }
        ];

        const Icon = ({ name, className }) => (
            <i data-lucide={name} className={className}></i>
        );

        function App() {
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                // Inicializa ícones
                lucide.createIcons();
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            // Re-inicializa ícones quando o menu ou DOM muda
            useEffect(() => { lucide.createIcons(); });

            return (
                <div className="min-h-screen bg-deep-black">
                    {/* Navbar */}
                    <nav className={`fixed w-full z-50 transition-all duration-300 ${scrolled ? 'bg-black/90 backdrop-blur-md py-4 border-b border-white/10' : 'bg-transparent py-6'}`}>
                        <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
                            <div className="flex items-center gap-2">
                                <div className="w-10 h-10 bg-racing-red rounded-lg flex items-center justify-center">
                                    <Icon name="car" className="text-white w-6 h-6" />
                                </div>
                                <span className="text-2xl font-display font-bold tracking-tighter text-pure-white uppercase">
                                    FRATELLI<span className="text-racing-red italic">STUDIO</span>
                                </span>
                            </div>

                            <div className="hidden md:flex items-center gap-8">
                                {['Início', 'Serviços', 'Contato'].map((item) => (
                                    <a key={item} href={`#${item.toLowerCase()}`} className="text-xs font-bold uppercase tracking-widest hover:text-racing-red transition-colors text-pure-white">
                                        {item}
                                    </a>
                                ))}
                            </div>

                            <button className="md:hidden text-white" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                                <Icon name={isMenuOpen ? "x" : "menu"} className="w-6 h-6" />
                            </button>
                        </div>
                    </nav>

                    {/* Hero */}
                    <section id="inicio" className="relative h-screen flex items-center justify-center overflow-hidden">
                        <div className="absolute inset-0 z-0">
                            <img src="https://images.unsplash.com/photo-1619642751034-765dfdf7c58e?auto=format&fit=crop&q=80&w=1920" 
                                 className="w-full h-full object-cover opacity-40 animate-slow-zoom" />
                            <div className="absolute inset-0 bg-gradient-to-t from-deep-black via-transparent to-deep-black" />
                        </div>
                        
                        <div className="relative z-10 text-center px-6">
                            <span className="inline-block border border-racing-red/50 text-racing-red px-4 py-1 rounded-full text-[10px] font-bold uppercase tracking-[0.3em] mb-4 bg-racing-red/10">Estética Automotiva de Elite</span>
                            <h1 className="text-6xl md:text-8xl font-display font-bold leading-none mb-8 shiny-text uppercase">
                                PAIXÃO POR <br /> <span className="text-racing-red italic">PERFEIÇÃO.</span>
                            </h1>
                            <div className="flex flex-col sm:flex-row gap-4 justify-center">
                                <a href={WHATSAPP_LINK} className="bg-racing-red text-white px-10 py-4 rounded-full font-bold uppercase tracking-widest hover:scale-105 transition-transform">
                                    Agendar Agora
                                </a>
                            </div>
                        </div>
                    </section>

                    {/* Serviços */}
                    <section id="servicos" className="py-24 bg-dark-gray">
                        <div className="max-w-7xl mx-auto px-6">
                            <div className="text-center mb-16">
                                <h2 className="text-4xl md:text-5xl font-display font-bold text-pure-white mb-4 uppercase">Serviços <span className="text-racing-red italic">Especiais</span></h2>
                                <div className="w-20 h-1 bg-racing-red mx-auto"></div>
                            </div>
                            
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                {SERVICES.map((s) => (
                                    <div key={s.id} className="group bg-deep-black p-8 rounded-2xl border border-white/5 hover:border-racing-red/30 transition-all">
                                        <div className="text-racing-red mb-6"><Icon name={s.icon} className="w-10 h-10" /></div>
                                        <h3 className="text-xl font-bold text-pure-white mb-3 uppercase tracking-tight">{s.title}</h3>
                                        <p className="text-sm leading-relaxed opacity-70">{s.description}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Contato CTA */}
                    <section id="contato" className="py-20 bg-deep-black border-t border-white/5">
                        <div className="max-w-3xl mx-auto text-center px-6">
                            <h2 className="text-3xl font-display font-bold text-pure-white mb-6 uppercase">Pronto para elevar o nível do seu carro?</h2>
                            <p className="mb-10 opacity-60">Atendimento personalizado via WhatsApp com especialistas em estética.</p>
                            <a href={WHATSAPP_LINK} className="inline-flex items-center gap-3 bg-whatsapp-green text-white px-12 py-5 rounded-full font-bold uppercase tracking-widest hover:shadow-[0_0_30px_rgba(37,211,102,0.3)] transition-all">
                                <Icon name="message-circle" className="w-6 h-6" /> Chamar no WhatsApp
                            </a>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="py-10 text-center border-t border-white/5 opacity-40 text-[10px] uppercase tracking-widest">
                        © 2026 Fratelli Studio Automotivo. Todos os direitos reservados.
                    </footer>

                    {/* Botão Flutuante */}
                    <a href={WHATSAPP_LINK} className="fixed bottom-6 right-6 bg-whatsapp-green p-4 rounded-full shadow-2xl z-50 hover:scale-110 transition-transform">
                        <Icon name="message-circle" className="text-white w-7 h-7" />
                    </a>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
